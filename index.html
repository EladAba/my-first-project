<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב תשלומים</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>מעקב תשלומים</h1>

    <div class="card">
      <h2>הוספת רשומה</h2>
      <form id="entryForm">
        <div class="form-group">
          <label for="name">שם מלא</label>
          <input type="text" id="name" placeholder="הזן שם מלא" required />
        </div>
        <div class="form-group">
          <label for="amount">סכום (₪)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" required />
        </div>
        <button type="submit" class="btn btn-primary">הוסף רשומה</button>
      </form>
    </div>

    <div class="summary-bar">
      <div class="summary-item">
        <span class="summary-label">סה"כ רשומות</span>
        <span class="summary-value" id="totalCount">0</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <span class="summary-label">סה"כ סכום</span>
        <span class="summary-value total-amount" id="totalAmount">₪0.00</span>
      </div>
    </div>

    <div class="card">
      <div class="table-header">
        <h2>רשימת תשלומים</h2>
        <button class="btn btn-export" id="exportBtn" disabled>
          ייצוא לאקסל
        </button>
      </div>

      <div id="emptyState" class="empty-state">
        <p>אין רשומות עדיין. הוסף את הרשומה הראשונה!</p>
      </div>

      <table id="entriesTable" class="hidden">
        <thead>
          <tr>
            <th>#</th>
            <th>שם מלא</th>
            <th>סכום</th>
            <th>תאריך</th>
            <th>פעולה</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
